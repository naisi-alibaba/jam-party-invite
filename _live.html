<!DOCTYPE html><html><head><meta charset="UTF-8"></head><body><img id="out" style="width:280px"><div id="log"></div>
<script>
var W=560,H=880,sc=2,cv=document.createElement('canvas');cv.width=W*sc;cv.height=H*sc;var ctx=cv.getContext('2d');ctx.scale(sc,sc);
ctx.fillStyle='#fbf2e0';ctx.fillRect(0,0,W,H);
ctx.fillStyle='#cc5648';ctx.textAlign='center';ctx.font='700 52px serif';ctx.fillText('果酱派对',W/2,150);
ctx.fillStyle='#3a1f13';ctx.font='700 42px serif';ctx.fillText('小美',W/2,560);
var jar=new Image();jar.crossOrigin='anonymous';
jar.onload=function(){var jw=230,jh=jw*jar.height/jar.width;ctx.drawImage(jar,W/2-jw/2,205,jw,jh);
 try{document.getElementById('out').src=cv.toDataURL('image/png');document.getElementById('log').textContent='EXPORT_OK';}
 catch(e){document.getElementById('log').textContent='TAINTED:'+e.message;}};
jar.onerror=function(){document.getElementById('log').textContent='IMG_LOAD_FAIL';};
jar.src='https://naisi-alibaba.github.io/jam-party-invite/img/jars/jar-3.png';
</script></body></html>
